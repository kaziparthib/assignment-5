<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
    <!-- daisyUI && Tailwindcss -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- fontawsome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

  
<body class="">
  <section class="w-[450px] h-[650px] shadow-2xl mx-auto my-8 ">
    <div class=" pt-6 text-center">
      <img class="w-[100px] h-[100px] mx-auto mb-3" src="./assets/github-logo.png" alt="">
      <h1 class="font-bold ">GitHub Issues Tracker</h1>
      <p class="text-gray-400">Sign in to manage your issues</p>
    </div>
    
  <div class="card bg-base-100 w-full max-w-sm shrink-0 mx-auto">
      <div class="card-body">
        <fieldset class="fieldset">
          <label class="label text-black">Username</label>
          <input id="name" type="text" class="input" placeholder="Enter Username" />
          <label class="label text-black">Password</label>
          <input id="password" type="password" class="input" placeholder="Enter Password" />
          <button id="login-btn" class="btn  btn-primary mt-4">Login</button>
        </fieldset>
      </div>
    </div>
  </section>
  
  <script src="./script/index.js"></script>
</body>
</html>
