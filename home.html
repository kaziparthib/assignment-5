<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!--  -->

  <!-- Daisy + Tailwind -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!--  -->
</head>

<body>
  <header class="bg-base-100  shadow-sm">
    <div class="navbar w-11/12 mx-auto flex flex-col md:flex-row gap-3 md:gap-0">


      <div class="flex items-center gap-2 flex-1">
        <img class="w-8 " src="./assets/github-logo.png" alt="">
        <h1 class="font-semibold text-base md:text-lg text-black">
          GitHub Issues Tracker
        </h1>
      </div>


      <div class="flex flex-wrap md:flex-nowrap gap-2 w-full md:w-auto">

        <input id="input-search" type="text" placeholder="search" class="input input-bordered w-full md:w-48" />


        <button onclick="toggle('search-btn')" id="search-btn" class="btn btn-primary w-full md:w-auto">
           search
        </button>

      </div>

    </div>
  </header>
  <!--  -->
   
    <section class="tabs w-9/12 mx-auto py-6 pl-6 mb-3 mt-4 shadow-sm">
      <div id="btn-tabs" class="flex gap-3">
        <button onclick="toggle('all-btn')" id="all-btn" class=" tab-all btn btn-primary  w-[110px]">
          All
        </button>
        <button onclick="toggle('open-btn')" id="open-btn" class="tab-open btn btn-outline btn-primary  w-[110px]">
          Open
        </button>
        <button onclick="toggle('closed-btn')" id="closed-btn" class="tab-close btn btn-outline btn-primary  w-[110px]">
          Closed
        </button>
      </div>
    </section>
    <!--  -->
      <section class="counter w-9/12 mx-auto bg-white p-6 border-b border-[#E4E4E7]">
      <div id="counter" class="flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-2">
          <div>
           <img src="./assets/Aperture.png" class="rounded-full bg-[#4A00FF10] p-2" alt="">
          </div>
          <div>
            <h1 id="issue-count" class="font-semibold text-[20px]"><span id="count">0</span>Issues</h1>
            <p class="text-[#64748B]">Track and manage your project issues</p>
          </div>
        </div>


        <div class="flex gap-4 ">
          <p><i class="fa-solid fa-circle text-[#00A96E]"></i> Open</p>
          <p><i class="fa-solid fa-circle text-[#A855F7]"></i> Closed</p>
        </div>
      </div>
    </section>
    <!--  -->
    <section id="spinner" class="flex justify-center items-center pt-40"><span class="loading loading-dots loading-xl"></span></section>
    <section id="all-page" class="pt-2">
      <section id="all-section"  class="grid grid-cols-1 md:grid-cols-2 gap-3.5 lg:grid-cols-4 w-9/12 mx-auto"></section>
     </section>

     <!-- Open the modal using ID.showModal() method -->
<!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
<dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
  <div id="box" class="modal-box">
   
  
  </div>
</dialog>
    

  <script src="./script/home.js"></script>
</body>

</html>
